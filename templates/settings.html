{% extends "base.html" %}

{% block title %}Settings - Brawlytics{% endblock %}

{% block extra_styles %}
<style>
    html, body {
        overflow: clip;
        height: 100vh;
    }

    .breadcrumb {
        margin-bottom: 0.75rem;
    }

    .settings-layout {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 1rem;
        height: calc(100vh - 140px);
        overflow: visible;
        width: 100%;
    }

    /* Left Column */
    .left-column {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-self: start;
    }

    .settings-hero-card {
        background: var(--card);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 0.75rem;
        border: 2px solid rgba(var(--primary-rgb), 0.25);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80px;
    }

    .settings-hero-card h1 {
        font-size: 1.8rem;
        font-weight: 900;
        text-align: center;
        margin: 0;
        line-height: 1;
        color: var(--primary);
        letter-spacing: -0.3px;
        padding-bottom: 0.25rem;
    }

    .hero-desc {
        text-align: center;
        color: var(--text-dim);
        font-size: 0.8rem;
        line-height: 1.3;
    }

    /* Right column scrollable */
    .settings-main {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        overflow-y: auto;
        overflow-x: clip;
        height: calc(100vh - 140px);
        padding: 6px;
    }

    .settings-main::-webkit-scrollbar {
        width: 4px;
    }

    .settings-main::-webkit-scrollbar-thumb {
        background: rgba(var(--primary-rgb), 0.3);
        border-radius: 2px;
    }

    /* Settings sections */
    .settings-section {
        background: var(--card);
        backdrop-filter: blur(15px);
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid rgba(var(--primary-rgb), 0.2);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        transition: all 0.2s ease;
    }

    .settings-section:hover {
        border-color: rgba(var(--primary-rgb), 0.4);
        box-shadow: 0 6px 28px rgba(var(--primary-rgb), 0.15);
    }

    .section-header {
        background: var(--dark);
        padding: 0.6rem 0.8rem;
        font-size: 0.85rem;
        font-weight: 800;
        border-bottom: 2px solid rgba(var(--primary-rgb), 0.4);
        text-transform: uppercase;
        letter-spacing: 1px;
        flex-shrink: 0;
        color: var(--text);
    }

    .section-content {
        padding: 1rem;
    }

    /* Theme grid */
    .theme-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.75rem;
    }

    .theme-option {
        position: relative;
        cursor: pointer;
    }

    .theme-option input[type="radio"] {
        display: none;
    }

    .theme-card {
        background: rgba(255,255,255,0.04);
        padding: 0.75rem;
        border-radius: 10px;
        text-align: center;
        transition: all 0.2s ease;
        border: 2px solid rgba(255,255,255,0.06);
    }

    .theme-option input[type="radio"]:checked + .theme-card {
        border-color: rgba(var(--primary-rgb), 0.8);
        background: rgba(var(--primary-rgb), 0.08);
        box-shadow: 0 4px 16px rgba(var(--primary-rgb), 0.2);
    }

    .theme-card:hover {
        transform: translateY(-2px);
        border-color: rgba(var(--primary-rgb), 0.4);
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .theme-preview {
        width: 100%;
        height: 40px;
        border-radius: 6px;
        margin: 0 auto 0.6rem;
        display: flex;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        transition: transform 0.2s ease;
    }

    .theme-preview-color {
        flex: 1;
        height: 100%;
    }

    .theme-preview-color:first-child {
        border-radius: 6px 0 0 6px;
    }

    .theme-preview-color:last-child {
        border-radius: 0 6px 6px 0;
    }

    .theme-option input[type="radio"]:checked + .theme-card .theme-preview,
    .theme-card:hover .theme-preview {
        transform: scale(1.04);
    }

    .theme-name {
        font-weight: 700;
        text-transform: capitalize;
        color: var(--text);
        font-size: 0.8rem;
        letter-spacing: 0.5px;
    }

    /* Custom color picker */
    .custom-color-picker {
        margin-top: 0.75rem;
        padding: 0.75rem 1rem;
        background: rgba(255,255,255,0.04);
        border-radius: 10px;
        border: 2px solid rgba(255,255,255,0.06);
        display: flex;
        align-items: center;
        gap: 1.25rem;
        transition: all 0.2s ease;
        flex-wrap: wrap;
    }

    .custom-color-picker.hidden {
        display: none;
    }

    .color-picker-group {
        display: flex;
        align-items: center;
        gap: 0.6rem;
    }

    .color-picker-group label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
    }

    .color-swatch-wrap {
        position: relative;
        width: 44px;
        height: 32px;
        border-radius: 7px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        flex-shrink: 0;
        border: 2px solid rgba(255,255,255,0.15);
    }

    .color-swatch-wrap input[type="color"] {
        position: absolute;
        inset: -6px;
        width: calc(100% + 12px);
        height: calc(100% + 12px);
        opacity: 0;
        cursor: pointer;
        border: none;
        padding: 0;
    }

    .color-swatch-preview {
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

    .custom-color-hex {
        padding: 0.35rem 0.6rem;
        background: var(--dark);
        border: 2px solid rgba(255,255,255,0.08);
        border-radius: 7px;
        color: var(--text);
        font-size: 0.82rem;
        font-family: monospace;
        width: 90px;
        transition: border-color 0.2s;
    }

    .custom-color-hex:focus {
        outline: none;
        border-color: rgba(var(--primary-rgb), 0.6);
        box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
    }

    .color-picker-divider {
        width: 1px;
        height: 28px;
        background: rgba(255,255,255,0.1);
        flex-shrink: 0;
    }

    /* Date Filter Styles */
    .date-filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 0.75rem;
        margin-bottom: 0.75rem;
    }

    .date-option {
        position: relative;
        cursor: pointer;
    }

    .date-option input[type="radio"] {
        display: none;
    }

    .date-card {
        background: rgba(255,255,255,0.04);
        padding: 0.75rem 0.75rem;
        border-radius: 10px;
        text-align: center;
        transition: all 0.2s ease;
        border: 2px solid rgba(255,255,255,0.06);
    }

    .date-option input[type="radio"]:checked + .date-card {
        border-color: rgba(var(--primary-rgb), 0.8);
        background: rgba(var(--primary-rgb), 0.08);
        box-shadow: 0 4px 16px rgba(var(--primary-rgb), 0.2);
    }

    .date-card:hover {
        transform: translateY(-2px);
        border-color: rgba(var(--primary-rgb), 0.4);
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .date-label {
        font-weight: 700;
        color: var(--text);
        font-size: 0.85rem;
        margin-bottom: 0.3rem;
    }

    .date-description {
        color: var(--text-dim);
        font-size: 0.75rem;
        line-height: 1.3;
    }

    .custom-date-inputs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-top: 0.75rem;
        padding: 1rem;
        background: rgba(255,255,255,0.04);
        border-radius: 10px;
        border: 2px solid rgba(255,255,255,0.06);
    }

    .custom-date-inputs.hidden {
        display: none;
    }

    .date-input-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
    }

    .date-input-label {
        font-weight: 600;
        color: var(--text);
        font-size: 0.8rem;
    }

    .date-input {
        padding: 0.6rem 0.75rem;
        background: var(--dark);
        border: 2px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        color: var(--text);
        font-size: 0.85rem;
        transition: all 0.2s;
    }

    .date-input:focus {
        outline: none;
        border-color: rgba(var(--primary-rgb), 0.6);
        box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
    }

    /* Two-column row for bottom settings boxes */
    .settings-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    .save-button {
        width: 100%;
        padding: 0.7rem;
        font-size: 0.85rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 0.75rem;
    }

    .save-button:hover {
        opacity: 0.9;
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(var(--primary-rgb), 0.3);
    }

    /* Mobile */
    @media (max-width: 768px) {
        html, body {
            overflow: auto;
            height: auto;
        }

        .settings-layout {
            grid-template-columns: 1fr;
            height: auto;
        }

        .settings-main {
            height: auto;
            overflow: visible;
        }

        .settings-hero-card h1 {
            font-size: 1.5rem;
        }

        .theme-grid {
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .date-filter-grid {
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .custom-date-inputs {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="/dashboard">Home</a> › Settings
</div>

<form method="POST">
<div class="settings-layout">
    <!-- Left: Hero card -->
    <div class="left-column">
        <div class="settings-hero-card">
            <h1>Settings</h1>
            <div class="hero-desc">Theme & data range</div>
        </div>
    </div>

    <!-- Right: Settings sections -->
    <div class="settings-main">

        <div class="settings-section">
            <div class="section-header">Appearance</div>
            <div class="section-content">
                <div class="theme-grid">
                    <label class="theme-option">
                        <input type="radio" name="theme" value="red">
                        <div class="theme-card">
                            <div class="theme-preview">
                                <div class="theme-preview-color" style="background:#ef4444"></div>
                                <div class="theme-preview-color" style="background:#111"></div>
                            </div>
                            <div class="theme-name">Red</div>
                        </div>
                    </label>

                    <label class="theme-option">
                        <input type="radio" name="theme" value="brawl">
                        <div class="theme-card">
                            <div class="theme-preview">
                                <div class="theme-preview-color" style="background:#e94560"></div>
                                <div class="theme-preview-color" style="background:#16213e"></div>
                            </div>
                            <div class="theme-name">Brawl</div>
                        </div>
                    </label>

                    <label class="theme-option">
                        <input type="radio" name="theme" value="purple">
                        <div class="theme-card">
                            <div class="theme-preview">
                                <div class="theme-preview-color" style="background:#8b5cf6"></div>
                                <div class="theme-preview-color" style="background:#2d2438"></div>
                            </div>
                            <div class="theme-name">Purple</div>
                        </div>
                    </label>

                    <label class="theme-option">
                        <input type="radio" name="theme" value="blue">
                        <div class="theme-card">
                            <div class="theme-preview">
                                <div class="theme-preview-color" style="background:#3b82f6"></div>
                                <div class="theme-preview-color" style="background:#1e293b"></div>
                            </div>
                            <div class="theme-name">Blue</div>
                        </div>
                    </label>

                    <label class="theme-option">
                        <input type="radio" name="theme" value="orange">
                        <div class="theme-card">
                            <div class="theme-preview">
                                <div class="theme-preview-color" style="background:#f97316"></div>
                                <div class="theme-preview-color" style="background:#292524"></div>
                            </div>
                            <div class="theme-name">Orange</div>
                        </div>
                    </label>

                    <label class="theme-option">
                        <input type="radio" name="theme" value="mono">
                        <div class="theme-card">
                            <div class="theme-preview">
                                <div class="theme-preview-color" style="background:#ffffff"></div>
                                <div class="theme-preview-color" style="background:#000000"></div>
                            </div>
                            <div class="theme-name">Mono</div>
                        </div>
                    </label>

                    <label class="theme-option">
                        <input type="radio" name="theme" value="custom" id="theme-custom">
                        <div class="theme-card">
                            <div class="theme-preview" id="custom-theme-preview" style="background: repeating-conic-gradient(#333 0% 25%, #1a1a1a 0% 50%) 0 0 / 10px 10px;">
                                <div class="theme-preview-color" id="custom-preview-accent" style="background:transparent"></div>
                                <div class="theme-preview-color" id="custom-preview-bg" style="background:transparent"></div>
                            </div>
                            <div class="theme-name">Custom</div>
                        </div>
                    </label>
                </div>

                <!-- Custom color picker (shown when Custom theme is selected) -->
                <div class="custom-color-picker hidden" id="custom-color-picker">
                    <!-- Accent color -->
                    <div class="color-picker-group">
                        <label for="color-picker-accent">Main</label>
                        <div class="color-swatch-wrap" id="accent-swatch-wrap">
                            <div class="color-swatch-preview" id="accent-swatch-preview"></div>
                            <input type="color" id="color-picker-accent" value="#ef4444">
                        </div>
                        <input type="text" class="custom-color-hex" id="accent-color-hex" value="" placeholder="#rrggbb" maxlength="7" spellcheck="false">
                    </div>
                    <div class="color-picker-divider"></div>
                    <!-- Background color -->
                    <div class="color-picker-group">
                        <label for="color-picker-bg">Background</label>
                        <div class="color-swatch-wrap" id="bg-swatch-wrap">
                            <div class="color-swatch-preview" id="bg-swatch-preview"></div>
                            <input type="color" id="color-picker-bg" value="#0a0a0a">
                        </div>
                        <input type="text" class="custom-color-hex" id="bg-color-hex" value="" placeholder="#rrggbb" maxlength="7" spellcheck="false">
                    </div>
                    <input type="hidden" name="custom_color" id="custom-color-hidden" value="{{ current_custom_color }}">
                    <input type="hidden" name="custom_bg" id="custom-bg-hidden" value="{{ current_custom_bg }}">
                </div>
            </div>
        </div>

        <div class="settings-row">

        <div class="settings-section">
            <div class="section-header">Data Filters</div>
            <div class="section-content">
                <div class="date-filter-grid">
                    <label class="date-option">
                        <input type="radio" name="date_range" value="all" {% if current_date_range == 'all' %}checked{% endif %} onchange="toggleCustomDates(false)">
                        <div class="date-card">
                            <div class="date-label">All Time</div>
                            <div class="date-description">Show all available data</div>
                        </div>
                    </label>

                    <label class="date-option">
                        <input type="radio" name="date_range" value="30d" {% if current_date_range == '30d' %}checked{% endif %} onchange="toggleCustomDates(false)">
                        <div class="date-card">
                            <div class="date-label">Last 30 Days</div>
                            <div class="date-description">Show only last 30 days</div>
                        </div>
                    </label>

                    <label class="date-option">
                        <input type="radio" name="date_range" value="custom" {% if current_date_range == 'custom' %}checked{% endif %} onchange="toggleCustomDates(true)">
                        <div class="date-card">
                            <div class="date-label">Custom Range</div>
                            <div class="date-description">Choose specific dates</div>
                        </div>
                    </label>
                </div>

                <div id="custom-date-inputs" class="custom-date-inputs {% if current_date_range != 'custom' %}hidden{% endif %}">
                    <div class="date-input-group">
                        <label class="date-input-label">Start Date</label>
                        <input type="date" name="start_date" class="date-input" value="{{ start_date }}">
                    </div>
                    <div class="date-input-group">
                        <label class="date-input-label">End Date</label>
                        <input type="date" name="end_date" class="date-input" value="{{ end_date }}">
                    </div>
                </div>

                <button type="submit" class="save-button">Save Changes</button>
            </div>
        </div>

        <div class="settings-section" style="display:flex; flex-direction:column;">
            <div class="section-header">Box hover</div>
            <div class="section-content" style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; width:100%;">
                    <label class="date-option">
                        <input type="radio" name="hover_effects" value="on" id="hover-on">
                        <div class="date-card" style="text-align:center;">
                            <div class="date-label">Hover On</div>
                            <div class="date-description">Cards glow on mouse over</div>
                        </div>
                    </label>
                    <label class="date-option">
                        <input type="radio" name="hover_effects" value="off" id="hover-off">
                        <div class="date-card" style="text-align:center;">
                            <div class="date-label">Hover Off</div>
                            <div class="date-description">No glow on mouse over</div>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        </div><!-- end .settings-row -->

    </div>
</div>
</form>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // ── Restore selected theme from localStorage ──────────────────────────
    const currentTheme = localStorage.getItem('userTheme') || 'red';
    const themeInput = document.querySelector(`input[name="theme"][value="${currentTheme}"]`);
    if (themeInput) themeInput.checked = true;

    // ── Restore custom colors only if previously saved ────────────────────
    const savedAccent = localStorage.getItem('customColor') || '{{ current_custom_color }}';
    const savedBg     = localStorage.getItem('customBg')    || '{{ current_custom_bg }}';
    // Only populate UI if we have a real saved color (not the server default placeholders when nothing chosen)
    if (savedAccent && savedAccent !== 'None') setAccentUI(savedAccent);
    if (savedBg     && savedBg     !== 'None') setBgUI(savedBg);

    // Show/hide the custom color picker based on current selection
    toggleCustomColorPicker(currentTheme === 'custom');

    // ── Theme radio change ────────────────────────────────────────────────
    document.querySelectorAll('.theme-option input').forEach(input => {
        input.addEventListener('change', () => {
            localStorage.setItem('userTheme', input.value);
            applyTheme(input.value);
            toggleCustomColorPicker(input.value === 'custom');
        });
    });

    // ── Accent color picker ───────────────────────────────────────────────
    const accentPicker = document.getElementById('color-picker-accent');
    const accentHex    = document.getElementById('accent-color-hex');

    accentPicker.addEventListener('input', () => {
        setAccentUI(accentPicker.value);
        applyCustomLive();
    });
    accentHex.addEventListener('input', () => {
        let val = accentHex.value.trim();
        if (!val.startsWith('#')) val = '#' + val;
        if (/^#[0-9a-fA-F]{6}$/.test(val)) { setAccentUI(val); applyCustomLive(); }
    });
    accentHex.addEventListener('blur', () => {
        let val = accentHex.value.trim();
        if (!val.startsWith('#')) val = '#' + val;
        if (!/^#[0-9a-fA-F]{6}$/.test(val)) setAccentUI(localStorage.getItem('customColor') || '#ef4444');
    });

    // ── Background color picker ───────────────────────────────────────────
    const bgPicker = document.getElementById('color-picker-bg');
    const bgHex    = document.getElementById('bg-color-hex');

    bgPicker.addEventListener('input', () => {
        setBgUI(bgPicker.value);
        applyCustomLive();
    });
    bgHex.addEventListener('input', () => {
        let val = bgHex.value.trim();
        if (!val.startsWith('#')) val = '#' + val;
        if (/^#[0-9a-fA-F]{6}$/.test(val)) { setBgUI(val); applyCustomLive(); }
    });
    bgHex.addEventListener('blur', () => {
        let val = bgHex.value.trim();
        if (!val.startsWith('#')) val = '#' + val;
        if (!/^#[0-9a-fA-F]{6}$/.test(val)) setBgUI(localStorage.getItem('customBg') || '#0a0a0a');
    });
});

function setAccentUI(hex) {
    const picker  = document.getElementById('color-picker-accent');
    const hexInp  = document.getElementById('accent-color-hex');
    const hidden  = document.getElementById('custom-color-hidden');
    const swatch  = document.getElementById('accent-swatch-preview');
    const preview = document.getElementById('custom-preview-accent');
    const wrap    = document.getElementById('accent-swatch-wrap');
    if (picker)  picker.value  = hex;
    if (hexInp)  hexInp.value  = hex;
    if (hidden)  hidden.value  = hex;
    if (swatch)  swatch.style.background = hex;
    if (preview) preview.style.background = hex;
    if (wrap)    wrap.style.borderColor = hex;
    localStorage.setItem('customColor', hex);
    updateTileCheckerboard();
}

function setBgUI(hex) {
    const picker  = document.getElementById('color-picker-bg');
    const hexInp  = document.getElementById('bg-color-hex');
    const hidden  = document.getElementById('custom-bg-hidden');
    const swatch  = document.getElementById('bg-swatch-preview');
    const preview = document.getElementById('custom-preview-bg');
    const wrap    = document.getElementById('bg-swatch-wrap');
    if (picker)  picker.value  = hex;
    if (hexInp)  hexInp.value  = hex;
    if (hidden)  hidden.value  = hex;
    if (swatch)  swatch.style.background = hex;
    if (preview) preview.style.background = hex;
    if (wrap)    wrap.style.borderColor = hex;
    localStorage.setItem('customBg', hex);
    updateTileCheckerboard();
}

/** Remove checkerboard from tile once both colors are chosen */
function updateTileCheckerboard() {
    const tile   = document.getElementById('custom-theme-preview');
    const accent = localStorage.getItem('customColor');
    const bg     = localStorage.getItem('customBg');
    if (!tile) return;
    if (accent && bg) {
        tile.style.background = '';  // let the child divs show through
    }
}

/** Apply both custom colors live to the page */
function applyCustomLive() {
    const customRadio = document.getElementById('theme-custom');
    if (customRadio && customRadio.checked) {
        applyTheme('custom');
    }
}

function toggleCustomColorPicker(show) {
    const picker = document.getElementById('custom-color-picker');
    if (!picker) return;
    picker.classList.toggle('hidden', !show);
}

function toggleCustomDates(show) {
    const el = document.getElementById('custom-date-inputs');
    if (!el) return;
    el.classList.toggle('hidden', !show);
}

// ── Hover effects radio ───────────────────────────────────────────────────
const hoverOn  = document.getElementById('hover-on');
const hoverOff = document.getElementById('hover-off');
if (hoverOn && hoverOff) {
    const current = localStorage.getItem('hoverEffects');
    if (current === 'off') { hoverOff.checked = true; } else { hoverOn.checked = true; }

    [hoverOn, hoverOff].forEach(r => r.addEventListener('change', () => {
        const on = hoverOn.checked;
        localStorage.setItem('hoverEffects', on ? 'on' : 'off');
        if (window._setHoverEffects) window._setHoverEffects(on);
    }));
}
</script>

{% endblock %}
