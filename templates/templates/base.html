<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Brawlytics{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: {{ theme.primary }};
            --bg: {{ theme.bg }};
            --card: {{ theme.card }};
            --dark: {{ theme.dark }};
            --text: #e5e7eb;
            --text-dim: #9ca3af;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .nav {
            background: var(--card);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-left {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        
        .nav-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
            font-weight: 500;
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--primary);
        }
        
        .mode-badge {
            padding: 0.4rem -1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: transparent;
            color: var(--text-dim);
            
        }

        

        .nav-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        
        .username {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        
        .btn {
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .btn-outline {
            color: var(--primary);
            border: 1.5px solid var(--primary);
            background: transparent;
        }
        
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }
        
        .breadcrumb {
            margin-bottom: 2rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        
        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        .page-header {
            margin-bottom: 2.5rem;
        }
        
        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        
        .page-subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }
        
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }
        
        .stat-card {
            background: var(--card);
            padding: 1.75rem;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }
        
        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text);
        }
        
        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-links {
                display: none;
            }
            
            .page-title {
                font-size: 2rem;
            }
        }

        
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <nav class="nav">
        <div class="nav-left">
            <a href="/dashboard" class="logo">Brawlytics</a>
            <div class="nav-links">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/region/all" class="nav-link">All Regions</a>
                <a href="/meta" class="nav-link">Meta</a>
                <a href="/brawlers" class="nav-link">Brawlers</a>
                <a href="/modes" class="nav-link">Maps & Modes</a>
                {% if view_mode == 'offseason' %}
                <a href="/players" class="nav-link">Players</a>
                
                <a href="/possible-teams" class="nav-link">Possible Teams</a>
                {% endif %}
                <a href="/about" class="nav-link">About</a>
                <a href="/settings" class="nav-link">Settings</a>
            </div>
        </div>
        <div class="nav-right">
            <span class="mode-badge">{{ view_mode|upper }}</span>
            
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <script>
        // Highlight active nav link based on current path
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                const linkPath = link.getAttribute('href');
                
                // Exact match or starts with (for nested pages)
                if (currentPath === linkPath || 
                    (linkPath !== '/dashboard' && currentPath.startsWith(linkPath))) {
                    link.classList.add('active');
                } else if (linkPath === '/dashboard' && currentPath === '/') {
                    link.classList.add('active');
                } else if (linkPath === '/region/all' && currentPath.startsWith('/region/')) {
                    link.classList.add('active');
                } else if (linkPath === '/region/all' && currentPath.startsWith('/team/')) {
                    link.classList.add('active');
                }
            });
        });


        const themes = {
            'red': {'primary': '#ef4444', 'bg': '#0a0a0a', 'card': '#111111', 'dark': '#1a1a1a'},
            'brawl': {'primary': '#e94560', 'bg': '#1a1a2e', 'card': '#16213e', 'dark': '#0f3460'},
            'purple': {'primary': '#8b5cf6', 'bg': '#1e1b29', 'card': '#2d2438', 'dark': '#1a1625'},
            'blue': {'primary': '#3b82f6', 'bg': '#0f172a', 'card': '#1e293b', 'dark': '#0f172a'},
            'green': {'primary': '#10b981', 'bg': '#064e3b', 'card': '#065f46', 'dark': '#022c22'},
            'orange': {'primary': '#f97316', 'bg': '#1c1917', 'card': '#292524', 'dark': '#1c1917'}
        };

        // Load theme from localStorage (not sessionStorage!)
        function loadTheme() {
            const savedTheme = localStorage.getItem('userTheme') || 'red';
            applyTheme(savedTheme);
        }

        function applyTheme(themeName) {
            const theme = themes[themeName] || themes['red'];
            const root = document.documentElement;
            
            root.style.setProperty('--primary', theme.primary);
            root.style.setProperty('--bg', theme.bg);
            root.style.setProperty('--card', theme.card);
            root.style.setProperty('--dark', theme.dark);
        }

        function saveTheme(themeName) {
            localStorage.setItem('userTheme', themeName);
            applyTheme(themeName);
        }

        // Apply theme immediately (before page renders)
        loadTheme();
    </script>

    {% block scripts %}{% endblock %}


</body>
</html>
